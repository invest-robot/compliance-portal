name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build client
        run: npm run build:client

      - name: Deploy to CloudBase
        run: |
          npm install -g @cloudbase/cli@latest
          cloudbase login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          # Install all required packages in a temp location
          npm install @cloudbase/framework-plugin-website@latest
          npm install @cloudbase/framework-plugin-website@latest --prefix /tmp/cb-plugins
          # Copy plugin to a location tcb can find
          mkdir -p /home/runner/cloudbase-framework/registry/node_modules/@cloudbase
          cp -r node_modules/@cloudbase/framework-plugin-website /home/runner/cloudbase-framework/registry/node_modules/@cloudbase/
          # Deploy using website deploy instead of framework deploy
          cloudbase website deploy -e jzsz-d1g8h2zqf66ba4352 -d dist/client
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
