name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build client
        run: npm run build:client

      - name: Deploy to CloudBase
        run: |
          npm install -g @cloudbase/cli@latest
          echo "Secret ID length: ${#TCB_SECRET_ID}"
          echo "Secret Key length: ${#TCB_SECRET_KEY}"
          if [ -z "$TCB_SECRET_ID" ] || [ -z "$TCB_SECRET_KEY" ]; then
            echo "ERROR: CLOUDBASE_SECRET_ID or CLOUDBASE_SECRET_KEY is empty!"
            exit 1
          fi
          cloudbase login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          cloudbase framework:deploy -e jzsz-d1g8h2zqf66ba4352
        env:
          TCB_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
